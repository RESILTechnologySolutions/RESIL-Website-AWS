name: Deploy RESIL Website to AWS

on:
  push:
    branches:
      - main
    paths:
      - "website/**"
      - ".github/workflows/deploy.yml"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  S3_BUCKET: resiltechnologysolutions.com
  CLOUDFRONT_DISTRIBUTION_ID: EMT6KMTWLAOT8

jobs:
  deploy:
    name: Deploy static website
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::271251458153:role/RESILWebsiteGitHubActionsDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync website files to S3
        run: |
          aws s3 sync website/ s3://${{ env.S3_BUCKET }}/ --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
